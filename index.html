<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Admin Dashboard</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="searchBar">
                <img src="" alt="mag glass">
                <div class="searchField">
                    <input type="text">
                </div>
            </div>
            <div class="notificationArea">
                <img src="" alt="bell">
                <img src="" alt="avatar">
                <p class="userName">Jane Doe</p>
            </div>

            <div class="greeting">
                <div class="avatar">

                </div>
                <div class="greetingText">
                    <p>Hi there,</p>
                    <p class="userName">Jane Doe (@doe)</p>
                </div>
            </div>
            <div class="actionBtns">
                <button type="button">New</button>
                <button type="button">Upload</button>
                <button type="button">Share</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebarHeading">
                <div class="sidebarLogo">
                </div>
                <h2>Dashboard</h2>
            </div>

            <ul>
                <li>Home</li>
                <li>Profile</li>
                <li>Messages</li>
                <li>History</li>
                <li>Tasks</li>
                <li>Communities</li>
            </ul>

            <ul>
                <li>Settings</li>
                <li>Support</li>
                <li>Privacy</li>
            </ul>
        </div>
        <div class="mainContent">
            MAINCONTENT
        </div>
    </div>



</body>

</html>
